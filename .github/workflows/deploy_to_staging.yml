name: Deploy to Staging

concurrency:
  group: staging-concurrency
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  pull-requests: read

on:
  release:
    types: [published]

jobs:
  run_migrations:
    name: Update database in Staging
    uses: ./.github/workflows/runMigrations.yml
    with:
      PullRequestCheckout: false
      Environment: Staging
    secrets:
      ClientId: ${{secrets.CLIENTID}}
      ClientSecret: ${{secrets.CLIENTSECRET}}

  build-and-push-latest-release-image-to-ghcr:
    name: Build and push latest release image to github container registry
    uses: equinor/armada/.github/workflows/build_and_publish_docker_image_to_container_registry.yml@main
    permissions:
      contents: read
      packages: write
    with:
      registry: ghcr.io
      image_name: ${{ github.repository }}
      tag: "${{ github.event.release.tag_name }}"
      secondary_tag: latest
      path_to_dockerfile: Dockerfile
      path_to_context: .
    secrets:
      registry_password: ${{ secrets.GITHUB_TOKEN }}
      registry_username: ${{ github.actor }}

  build-and-push-latest-release-image-to-aurora-prod-registry:
    name: Build and push latest release image to aurora prod registry
    uses: equinor/armada/.github/workflows/build_and_publish_docker_image_to_container_registry.yml@main
    permissions:
      contents: read
      packages: write
    with:
      registry: auroraprodacr.azurecr.io
      image_name: robotics/sara
      tag: "${{ github.event.release.tag_name }}"
      secondary_tag: latest
      path_to_dockerfile: Dockerfile
      path_to_context: .
    secrets:
      registry_password: ${{ secrets.ROBOTICS_AURORAPRODACR_PASSWORD }}
      registry_username: ${{ secrets.ROBOTICS_AURORAPRODACR_USERNAME }}

  deploy:
    name: Update deployment in Staging
    needs: build-and-push-latest-release-image-to-aurora-prod-registry
    uses: ./.github/workflows/update_aurora_deployment.yml
    with:
      Environment: staging
      Registry: auroraprodacr.azurecr.io
      ImageName: robotics/sara
      Tag: ${{ github.event.release.tag_name }}
      AuthorName: ${{ github.event.release.author.login }}
    secrets:
      DeployKey: ${{ secrets.ANALYTICS_INFRASTRUCTURE_DEPLOY_KEY }}
